name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.11"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install package + dev tools (pinned)
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.lock
          pip install -e . --no-deps

      - name: Lint (ruff)
        run: ruff check src scripts tests

      - name: Type-check (mypy)
        run: mypy src/volbench

      - name: Fetch data (from the Internet Archive; data tests skip if it fails)
        run: python scripts/build_realized.py || echo "data fetch failed; data-dependent tests will skip"

      - name: Run tests (with coverage)
        run: pytest -q --cov=volbench --cov-report=term-missing

      - name: Smoke-test the pipeline (fast settings)
        run: |
          python scripts/validate_estimators.py --days 300
          python -c "import sys; sys.path.insert(0,'src'); \
            from volbench.data import load_oxford_rv; from volbench.backtest import run_backtest; \
            rv = load_oxford_rv(tickers=['.SPX']).series('.SPX'); \
            r = run_backtest(rv, horizon=1, min_train=500, mcs_reps=100); \
            assert 'LogHAR' in r.mean_losses['QLIKE'], 'LogHAR missing from mean_losses'; \
            assert 'LogHAR' in r.mcs['QLIKE'].included, 'LogHAR not in 90% MCS on SPX h=1'; \
            print('pipeline OK: LogHAR in mean_losses and MCS')"

      - name: Equity-only benchmark sanity check
        run: |
          python -c "
          import sys; sys.path.insert(0, 'src')
          from volbench.data import load_oxford_rv
          from volbench.backtest import run_backtest
          ds = load_oxford_rv(tickers=['.SPX'])
          rv = ds.series('.SPX')
          r = run_backtest(rv, horizon=1, min_train=500, mcs_reps=500)
          mcs = set(r.mcs['QLIKE'].included)
          assert 'LogHAR' in r.mean_losses['QLIKE'], 'LogHAR missing from mean_losses'
          assert 'LogHAR' in mcs, f'LogHAR not in MCS; MCS={sorted(mcs)}'
          print(f'equity benchmark OK: LogHAR in MCS ({sorted(mcs)})')
          "

  report:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Compile the LaTeX report
        uses: xu-cheng/latex-action@v3
        with:
          working_directory: report
          root_file: volbench_report.tex
      - name: Upload PDF artifact
        uses: actions/upload-artifact@v4
        with:
          name: volbench-report
          path: report/volbench_report.pdf
